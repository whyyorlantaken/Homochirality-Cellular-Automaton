simulation:
  grid_size: [128, 128]
  total_steps: 1000
  boundary_condition: "periodic"

probabilities:
  p_neutral: 0.05      
  p_chiral: 0.02
  p_copy: 0.1

chaos:
  epsilon: 1.0         
  seed: 42             
  mode: "constant"

  pulse:
    start_step: 400
    end_step: 500
    magnitude: 5.0 

  linear_increase:
    start_step: 400
    end_step: 500
    max_epsilon: 5.0
